<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Samyak &amp; Sakshi - Wedding Invitation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-coastal: #fdfbf7;
            --ocean-navy: #1b3644;
            --seaglass-teal: #5f9ea0;
            --sand-gold: #d4be9f;
            --sand-light: #f4eee3;
            --text-dark: #2c3e46;
            --text-muted: #708090;
            --font-serif: 'Cormorant Garamond', serif;
            --font-sans: 'Montserrat', sans-serif;
            
            /* Custom Wedding Event Identifiers */
            --haldi-yellow: #f5c242;
            --wedding-green: #2e5a44;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-sans);
            background-color: #f5f2eb;
            color: var(--text-dark);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- LANDING CURTAIN OVERLAY --- */
        #curtain-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #ffffff, var(--bg-coastal));
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 1.2s cubic-bezier(0.77, 0, 0.175, 1), opacity 0.8s ease;
            overflow-y: auto;
            padding: 20px 0;
        }

        #curtain-overlay.opened {
            transform: translateY(-100%);
            opacity: 0;
            pointer-events: none;
        }

        .curtain-content {
            text-align: center;
            padding: 20px;
            max-width: 400px;
            animation: fadeIn 1.5s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Subtle Portrait Illustration Container */
        .illustration-frame {
            width: 210px;
            height: 210px;
            margin-bottom: 25px;
            border-radius: 50%;
            background: #ffffff;
            padding: 8px;
            box-shadow: 0 10px 25px rgba(212, 190, 159, 0.3);
            border: 1px solid var(--sand-gold);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .couple-svg {
            width: 100%;
            height: 100%;
            opacity: 0.85;
        }

        .curtain-content p.intro-tag {
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--seaglass-teal);
            margin-bottom: 5px;
        }

        .curtain-content h1 {
            font-family: var(--font-serif);
            font-size: 2.6rem;
            font-weight: 300;
            letter-spacing: 1px;
            color: var(--ocean-navy);
            line-height: 1.2;
            margin-bottom: 5px;
        }

        .curtain-content p.location-tag {
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--sand-gold);
            margin-bottom: 35px;
            font-weight: 500;
        }

        .enter-btn {
            background: none;
            border: 1px solid var(--seaglass-teal);
            padding: 14px 40px;
            font-family: var(--font-sans);
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--ocean-navy);
            cursor: pointer;
            font-weight: 500;
            background-color: transparent;
            transition: all 0.4s ease;
            border-radius: 25px;
        }

        .enter-btn:hover {
            background-color: var(--seaglass-teal);
            color: white;
            box-shadow: 0 5px 15px rgba(95, 158, 160, 0.3);
        }

        /* --- MAIN MOBILE WRAPPER --- */
        #main-content {
            opacity: 0;
            transition: opacity 1s ease 0.5s;
            max-width: 480px;
            margin: 0 auto;
            background: #ffffff;
            box-shadow: 0 0 40px rgba(27, 54, 68, 0.05);
            min-height: 100vh;
            position: relative;
        }

        #main-content.visible {
            opacity: 1;
        }

        /* Coastal Wave Divider Decoration */
        .wave-decor {
            width: 100%;
            height: 20px;
            display: block;
            fill: var(--bg-coastal);
        }

        section {
            padding: 55px 25px;
            text-align: center;
            border-bottom: 1px solid var(--sand-light);
            background-color: #ffffff;
        }

        .section-title {
            font-family: var(--font-serif);
            font-size: 2.1rem;
            font-weight: 400;
            margin-bottom: 25px;
            letter-spacing: 1px;
            color: var(--ocean-navy);
            position: relative;
            display: inline-block;
        }

        .section-title::after {
            content: '〜';
            position: absolute;
            bottom: -18px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            font-size: 1.2rem;
            color: var(--seaglass-teal);
        }

        /* --- HERO & SAND SCRATCH SECTION --- */
