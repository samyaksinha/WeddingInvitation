<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Samyak &amp; Sakshi - Wedding Invitation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-coastal: #fdfbf7;
            --ocean-navy: #1b3644;
            --seaglass-teal: #5f9ea0;
            --sand-gold: #d4be9f;
            --sand-light: #f4eee3;
            --text-dark: #2c3e46;
            --text-muted: #708090;
            --font-serif: 'Cormorant Garamond', serif;
            --font-sans: 'Montserrat', sans-serif;
            
            /* Custom Wedding Event Identifiers */
            --haldi-yellow: #f5c242;
            --wedding-green: #2e5a44;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-sans);
            background-color: #f5f2eb;
            color: var(--text-dark);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- LANDING CURTAIN OVERLAY (Fixed Display Fix) --- */
        #curtain-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #ffffff, var(--bg-coastal));
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 1s cubic-bezier(0.77, 0, 0.175, 1), opacity 0.6s ease;
        }

        #curtain-overlay.opened {
            transform: translateY(-100%);
            opacity: 0;
            pointer-events: none;
        }

        .curtain-content {
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 400px;
            animation: fadeIn 1.2s ease;
        }

        /* Subtle Portrait Illustration Container */
        .illustration-frame {
            width: 180px;
            height: 180px;
            margin: 0 auto 20px auto;
            border-radius: 50%;
            background: #ffffff;
            padding: 8px;
            box-shadow: 0 10px 25px rgba(212, 190, 159, 0.3);
            border: 1px solid var(--sand-gold);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .couple-svg {
            width: 100%;
            height: 100%;
            opacity: 0.85;
        }

        .curtain-content p.intro-tag {
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--seaglass-teal);
            margin-bottom: 5px;
        }

        .curtain-content h1 {
            font-family: var(--font-serif);
            font-size: 2.4rem;
            font-weight: 300;
            letter-spacing: 1px;
            color: var(--ocean-navy);
            line-height: 1.2;
            margin-bottom: 5px;
        }

        .curtain-content p.location-tag {
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--sand-gold);
            margin-bottom: 30px;
            font-weight: 500;
        }

        .enter-btn {
            background: none;
            border: 1px solid var(--seaglass-teal);
            padding: 14px 40px;
            font-family: var(--font-sans);
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--ocean-navy);
            cursor: pointer;
            font-weight: 500;
            background-color: transparent;
            transition: all 0.4s ease;
            border-radius: 25px;
            outline: none;
        }

        .enter-btn:hover {
            background-color: var(--seaglass-teal);
            color: white;
            box-shadow: 0 5px 15px rgba(95, 158, 160, 0.3);
        }

        /* --- MAIN MOBILE WRAPPER --- */
        #main-content {
            opacity: 0;
            display: none; /* Keep layout hidden completely to save mobile browser paint cycles */
            max-width: 480px;
            margin: 0 auto;
            background: #ffffff;
            box-shadow: 0 0 40px rgba(27, 54, 68, 0.05);
            min-height: 100vh;
            position: relative;
        }

        #main-content.visible {
            opacity: 1;
            display: block;
        }

        section {
            padding: 55px 25px;
            text-align: center;
            border-bottom: 1px solid var(--sand-light);
            background-color: #ffffff;
        }

        .section-title {
            font-family: var(--font-serif);
            font-size: 2.1rem;
            font-weight: 400;
            margin-bottom: 25px;
            letter-spacing: 1px;
            color: var(--ocean-navy);
            position: relative;
            display: inline-block;
        }

        .section-title::after {
            content: '〜';
            position: absolute;
            bottom: -18px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            font-size: 1.2rem;
            color: var(--seaglass-teal);
        }

        /* --- HERO & SAND SCRATCH SECTION --- */
        .hero {
            padding: 60px 20px 45px 20px;
            background: linear-gradient(to bottom, var(--bg-coastal), #ffffff);
        }

        .hero h2 {
            font-family: var(--font-serif);
            font-size: 2.8rem;
            font-weight: 300;
            line-height: 1.2;
            color: var(--ocean-navy);
        }

        .hero .ampersand {
            font-family: var(--font-serif);
            font-style: italic;
            color: var(--sand-gold);
            font-size: 2.2rem;
            display: block;
            margin: 2px 0;
        }

        .hero p.sub-banner {
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-top: 15px;
            margin-bottom: 10px;
        }

        /* Sand Canvas Core Container */
        .scratch-container {
            position: relative;
            width: 280px;
            height: 150px;
            margin: 25px auto;
            background-color: var(--sand-light);
            border-radius: 8px;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.04);
            overflow: hidden;
            border: 1px solid rgba(212, 190, 159, 0.3);
        }

        .scratch-reveal-text {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1;
            pointer-events: none;
            background-color: #fffdf9;
        }

        .scratch-reveal-text .date {
            font-family: var(--font-serif);
            font-size: 1.6rem;
            color: var(--ocean-navy);
            font-weight: 600;
            letter-spacing: 1px;
        }

        .scratch-reveal-text .day {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--seaglass-teal);
            margin-top: 5px;
        }

        #scratch-canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            cursor: pointer;
            touch-action: none;
            border-radius: 6px;
        }

        .scratch-instruction {
            font-size: 0.8rem;
            font-style: italic;
            color: var(--seaglass-teal);
            margin-top: 12px;
            font-weight: 400;
        }

        /* --- LIVE COUNTDOWN TIMER --- */
        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
        }

        .countdown-box {
            background: var(--bg-coastal);
            border: 1px solid var(--sand-light);
            width: 72px;
            padding: 12px 0;
            border-radius: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.01);
        }

        .countdown-val {
            font-family: var(--font-serif);
            font-size: 1.7rem;
            display: block;
            font-weight: 400;
            color: var(--ocean-navy);
            line-height: 1.1;
        }

        .countdown-lbl {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-top: 2px;
            display: inline-block;
        }

        /* --- VENUE MAP SECTION --- */
        .details-p {
            font-size: 0.95rem;
            color: var(--text-dark);
            margin-bottom: 6px;
        }
        
        .venue-title {
            font-family: var(--font-serif);
            font-size: 1.6rem;
            font-weight: 400;
            color: var(--ocean-navy);
            margin-top: 10px;
            letter-spacing: 0.5px;
        }

        /* --- TIMELINE SCHEDULE SECTION --- */
        .timeline {
            margin-top: 35px;
            text-align: left;
            padding-left: 15px;
            position: relative;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 4px;
            top: 5px;
            width: 1px;
            height: 93%;
            background-color: var(--sand-gold);
        }

        .timeline-date-header {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--ocean-navy);
            font-weight: 600;
            margin: 25px 0 15px -15px;
            padding-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .timeline-date-header::after {
            content: '';
            flex-grow: 1;
            height: 1px;
            background: linear-gradient(to right, var(--sand-gold), transparent);
        }

        .timeline-date-header:first-of-type {
            margin-top: 0;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 25px;
            padding-left: 25px;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -14px;
            top: 6px;
            width: 7px;
            height: 7px;
            background-color: var(--seaglass-teal);
            border-radius: 50%;
        }

        .time {
            font-size: 0.75rem;
            letter-spacing: 1px;
            color: var(--seaglass-teal);
            font-weight: 500;
        }

        .event-title {
            font-family: var(--font-serif);
            font-size: 1.3rem;
            font-weight: 400;
            color: var(--text-dark);
            line-height: 1.3;
        }

        /* --- COASTAL DRESS CODE SWATCH CARDS --- */
        .dress-code-flex {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 25px;
            align-items: center;
        }

        .dress-card {
            width: 90%;
            padding: 18px 15px;
            background: var(--bg-coastal);
            border: 1px solid var(--sand-light);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dress-event {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 10px;
            font-weight: 500;
        }

        .dress-badge {
            display: inline-block;
            padding: 7px 22px;
            font-size: 0.8rem;
            letter-spacing: 1.5px;
            font-weight: 500;
            color: white;
            border-radius: 20px;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .badge-yellow {
            background-color: var(--haldi-yellow);
            color: #4a3600;
        }

        .badge-green {
            background-color: var(--wedding-green);
        }

        /* --- RSVP INPUT FIELDS --- */
        .rsvp-form {
            text-align: left;
            margin-top: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
            color: var(--ocean-navy);
            font-weight: 500;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 14px 12px;
            border: 1px solid var(--sand-gold);
            background-color: #ffffff;
            font-family: var(--font-sans);
            font-size: 0.9rem;
            color: var(--text-dark);
            border-radius: 6px;
            outline: none;
            transition: all 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--seaglass-teal);
            box-shadow: 0 0 8px rgba(95, 158, 160, 0.15);
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 8px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            color: var(--text-dark);
            cursor: pointer;
        }

        .radio-option input {
            width: auto;
            accent-color: var(--seaglass-teal);
        }

        .submit-btn {
            width: 100%;
            background-color: var(--ocean-navy);
            color: white;
            border: none;
            padding: 16px;
            font-family: var(--font-sans);
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 10px;
            font-weight: 500;
            border-radius: 30px;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            background-color: var(--seaglass-teal);
            box-shadow: 0 6px 20px rgba(95, 158, 160, 0.25);
        }

        footer {
            padding: 45px 20px;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            background-color: var(--bg-coastal);
            border-top: 1px solid var(--sand-light);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
