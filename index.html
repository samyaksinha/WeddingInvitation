<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Samyak & Sakshi - Wedding Invitation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --text-dark: #231f20;
            --ocean-navy: #0d222f;
            --sundowner-orange: #fca34d;
            --sunset-rose: #e28e7d;
            --gold-glow: #e9b889;
            --sand-warm: #f7e6d4;
            --honey-glow: #f5d3b3;
            --amber-blush: #e8b495;
            --haldi-yellow: #f5c242;
            --dynamic-bg: linear-gradient(180deg, var(--sand-warm) 0%, var(--honey-glow) 35%, var(--amber-blush) 70%, var(--sundowner-orange) 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--honey-glow); color: var(--text-dark); overflow-x: hidden; }

        /* --- Fullscreen Engine --- */
        #beach-bg-canvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 3; pointer-events: none;
        }

        /* --- UI Styles --- */
        #curtain-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: linear-gradient(135deg, var(--sand-warm), var(--amber-blush), var(--sundowner-orange));
            transition: transform 1.3s cubic-bezier(0.77, 0, 0.175, 1), opacity 0.8s ease;
        }
        #curtain-overlay.opened { transform: translateY(-100%); opacity: 0; pointer-events: none; }
        
        .main-content { padding: 40px 20px; max-width: 480px; margin: 0 auto; display: none; }
        .main-content.visible { display: block; }

        .venue-display-frame {
            width: 100%; max-width: 320px; height: 380px; margin: 0 auto 30px auto;
            border-radius: 16px; overflow: hidden; box-shadow: 0 12px 28px rgba(0, 0, 0, 0.1);
        }
        .venue-photo { width: 100%; height: 100%; object-fit: cover; object-position: bottom center; }

        .map-widget-box {
            width: 100%; max-width: 160px; margin: 20px auto; border: 1px solid var(--text-dark);
            border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .map-btn {
            display: block; width: 100%; padding: 8px; background: var(--text-dark); color: #fff;
            text-align: center; font-size: 0.7rem; text-decoration: none; text-transform: uppercase;
        }

        .track-node-wrapper { margin-bottom: 30px; cursor: pointer; border: 1px solid #ccc; padding: 15px; border-radius: 10px; }
        .track-node-wrapper.selected { border-color: var(--sundowner-orange); background: #fff; }
    </style>
</head>
<body>

    <div id="curtain-overlay">
        <h1>Samyak & Sakshi</h1>
        <button class="enter-btn" onclick="openInvitation()">Open Invitation</button>
    </div>

    <div id="main-content" class="main-content">
        <canvas id="beach-bg-canvas"></canvas>
        
        <section id="venue">
            <h2>The Venue</h2>
            <div class="venue-display-frame">
                <img src="venue.jpeg" alt="Dallas Beach Resorts" class="venue-photo">
            </div>
            <div class="map-widget-box">
                <a href="https://maps.google.com" target="_blank" class="map-btn">Open in Maps</a>
            </div>
        </section>

        <section id="schedule">
            <h2>Interactive Schedule</h2>
            <div class="track-node-wrapper" id="node-sangeet" onclick="triggerEventAtmosphere('sangeet')">
                <h3>Sangeet Night</h3>
                <p>Tap to start the Midnight Mode</p>
            </div>
            <div class="track-node-wrapper" id="node-haldi" onclick="triggerEventAtmosphere('haldi')">
                <h3>Haldi</h3>
                <p>Tap for Pastel Pink Flower Shower</p>
            </div>
            <div class="track-node-wrapper" id="node-wedding" onclick="triggerEventAtmosphere('wedding')">
                <h3>Wedding</h3>
                <p>Tap for Sundowner Firework Display</p>
            </div>
        </section>
    </div>

    <script>
        const canvasBg = document.getElementById('beach-bg-canvas');
        const ctxBg = canvasBg.getContext('2d');
        let particles = [];
        let activeAtmosphere = 'default';

        function openInvitation() {
            document.getElementById('main-content').classList.add('visible');
            document.getElementById('curtain-overlay').classList.add('opened');
            animate();
        }

        function triggerEventAtmosphere(mode) {
            activeAtmosphere = mode;
            particles = [];
            const count = mode === 'haldi' ? 100 : 50;
            for(let i=0; i<count; i++) {
                particles.push({
                    x: Math.random() * window.innerWidth,
                    y: mode === 'haldi' ? -Math.random() * 500 : Math.random() * window.innerHeight,
                    size: mode === 'haldi' ? Math.random() * 15 + 10 : Math.random() * 3 + 1,
                    speedY: mode === 'haldi' ? Math.random() * 2 + 1 : (Math.random() - 0.5) * 10,
                    speedX: (Math.random() - 0.5) * 5,
                    opacity: 1, fade: 0.01,
                    color: mode === 'haldi' ? '#fbe3e3' : '#fca34d'
                });
            }
        }

        function animate() {
            ctxBg.clearRect(0, 0, window.innerWidth, window.innerHeight);
            particles.forEach(p => {
                p.y += p.speedY; p.x += p.speedX;
                ctxBg.globalAlpha = p.opacity;
                ctxBg.fillStyle = p.color;
                ctxBg.beginPath();
                ctxBg.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctxBg.fill();
                p.opacity -= p.fade;
            });
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
